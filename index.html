<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>practice-local-setting</title>
  <style>
    body {
      margin: 0;
      padding: 32px 20px 56px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
    }
    main {
      max-width: 820px;
      margin: 0 auto;
    }
    h1, h2 {
      color: #f8fafc;
    }
    a {
      color: #7dd3fc;
    }
    code, pre {

<body>
  <main>

    <p>practice chat が読む静的設定ファイルです。</p>

    <div class="card">
      <h2>公開中のJSON</h2>
      <ul>
        <li><a href="./profiles.json">profiles.json</a></li>
        <li><a href="./models.json">models.json</a></li>
      </ul>
    </div>

    <div class="card">
      <h2>アプリ設定先</h2>
      <pre><code>PROFILE_MANIFEST_URL = "https://oda-shuya.github.io/practice-local-setting/profiles.json"
MODEL_MANIFEST_URL = "https://oda-shuya.github.io/practice-local-setting/models.json"</code></pre>
